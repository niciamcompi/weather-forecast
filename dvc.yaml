"""
Automatisches Re-Training Pipeline.
Wird täglich via GitHub Actions oder lokalem Cron-Job ausgeführt.

Ablauf:
  1. Neue Daten nachladen (letzte 7 Tage)
  2. Features aktualisieren
  3. Modelle neu trainieren 
  4. Qualitätscheck: Neues Modell nur übernehmen, wenn besser als altes
  5. Vorhersagen für nächste 7 Tage erstellen
  6. Bericht generieren
"""

import pandas as pd
import numpy as np
import pickle
import json
import logging
import shutil
from pathlib import Path
from datetime import datetime
from sklearn.metrics import mean_absolute_error

logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")
log = logging.getLogger(__name__)

MODELS_DIR    = Path("models")
BACKUP_DIR    = Path("models/backup")
PROCESSED_DIR = Path("data/processed")
REPORT_DIR    = Path("reports")

for d in [BACKUP_DIR, REPORT_DIR]:
    d.mkdir(parents=True, exist_ok=True)

TARGETS_TO_TRAIN = [
    "temperature_2m",
    "precipitation",
    "wind_speed_10m",
]
HORIZONS = [1, 3, 6, 12, 24, 48]


def backup_models():
    """Aktuelle Modelle sichern, bevor neue trainiert werden."""
    ts = datetime.now().strftime("%Y%m%d")
    backup_path = BACKUP_DIR / ts
    backup_path.mkdir(exist_ok=True)
    for f in MODELS_DIR.glob("*.pkl"):
        shutil.copy(f, backup_path / f.name)
    log.info(f"Backup gespeichert: {backup_path}")
    return backup_path


def evaluate_model_on_holdout(model, df, feature_cols, target_col, horizon):
    """
    Qualitätsprüfung: Modell auf den letzten 30 Tagen evaluieren
    (diese Daten waren beim Training nicht dabei).
    """
    y_col = f"{target_col}_target_{horizon}h"
    if y_col not in df.columns:
        return None

    # Letzten 30 Tage als Holdout
    cutoff = df["time"].max() - pd.Timedelta(days=30)
    holdout = df[df["time"] >= cutoff].dropna(subset=[y_col])

    if len(holdout) < 10:
        return None

    available = [c for c in feature_cols if c in holdout.columns]
    X = holdout[available].fillna(0)
    y = holdout[y_col]

    preds = model.predict(X)
    return mean_absolute_error(y, preds)


def retrain_pipeline(
    full_retrain: bool = False,
    quality_threshold_pct: float = 5.0,
):
    """
    Haupt-Pipeline für tägliches Re-Training.

    Args:
        full_retrain: True = alles neu trainieren; False = nur neue Daten
        quality_threshold_pct: Neues Modell wird nur übernommen,
                               wenn es um diesen % besser ist.
    """
    from data_collector import update_recent, collect_all_history
    from feature_engineering import build_feature_matrix, get_feature_columns
    from train import train_all_models, train_global_model
    import mlflow

    report = {
        "timestamp":   datetime.now().isoformat(),
        "full_retrain": full_retrain,
        "results":     {},
    }

    # ── 1. Neue Daten laden ───────────────────────────────────────────────────
    log.info("=== Schritt 1: Daten aktualisieren ===")
    if full_retrain:
        collect_all_history(years_back=5)
    else:
        update_recent(days=7)

    # ── 2. Features neu berechnen ─────────────────────────────────────────────
    log.info("=== Schritt 2: Features berechnen ===")
    raw = pd.read_parquet("data/raw/all_cities_history.parquet")
    feat_df = build_feature_matrix(raw, horizons=HORIZONS)
    feat_df.to_parquet(PROCESSED_DIR / "features.parquet", index=False)

    feature_cols = get_feature_columns(feat_df, HORIZONS)

    # ── 3. Alte Modelle sichern ───────────────────────────────────────────────
    log.info("=== Schritt 3: Modell-Backup ===")
    backup_models()

    # ── 4. Modelle trainieren & Qualitätscheck ────────────────────────────────
    log.info("=== Schritt 4: Training & Qualitätscheck ===")
    mlflow.set_tracking_uri("mlruns")
    mlflow.set_experiment("swiss-weather-retrain")

    for target in TARGETS_TO_TRAIN:
        report["results"][target] = {}
        for h in HORIZONS:
            model_path = MODELS_DIR / f"{target}_{h}h.pkl"

            # Altes Modell evaluieren
            old_mae = None
            if model_path.exists():
                with open(model_path, "rb") as f:
                    old_model = pickle.load(f)
                old_mae = evaluate_model_on_holdout(
                    old_model, feat_df, feature_cols, target, h
                )

            # Neues Modell trainieren
            new_model = train_global_model(feat_df, feature_cols, target, h)
            new_mae = evaluate_model_on_holdout(
                new_model, feat_df, feature_cols, target, h
            )

            # Entscheidung: Neues übernehmen?
            if old_mae is not None and new_mae is not None:
                improvement = (old_mae - new_mae) / old_mae * 100
                accept = improvement > -quality_threshold_pct  # akzeptiere auch leicht schlechtere
                log.info(
                    f"  {target} {h}h: alt MAE={old_mae:.3f}, neu MAE={new_mae:.3f}, "
                    f"Δ={improvement:+.1f}% → {'✓ übernommen' if accept else '✗ verworfen'}"
                )
                if not accept:
                    # Altes Modell wiederherstellen
                    shutil.copy(BACKUP_DIR / datetime.now().strftime("%Y%m%d") / model_path.name,
                                model_path)
            else:
                accept = True
                log.info(f"  {target} {h}h: neues Modell übernommen (kein Vergleich möglich)")

            report["results"][target][f"{h}h"] = {
                "old_mae": old_mae,
                "new_mae": new_mae,
                "accepted": accept,
            }

    # ── 5. Vorhersagen erstellen ──────────────────────────────────────────────
    log.info("=== Schritt 5: Forecasts erstellen ===")
    from inference import run_forecast_pipeline
    run_forecast_pipeline()

    # ── 6. Bericht speichern ──────────────────────────────────────────────────
    ts = datetime.now().strftime("%Y%m%d_%H%M")
    report_path = REPORT_DIR / f"retrain_report_{ts}.json"
    with open(report_path, "w") as f:
        json.dump(report, f, indent=2, default=str)

    log.info(f"=== Fertig. Bericht: {report_path} ===")
    return report


if __name__ == "__main__":
    import argparse
    parser = argparse.ArgumentParser(description="Wetter-Modell Re-Training")
    parser.add_argument("--full", action="store_true", help="Vollständiges Re-Training")
    args = parser.parse_args()
    retrain_pipeline(full_retrain=args.full)
